# Example for Baota/Nginx on Tencent Lighthouse or a similar Linux VPS.
# Do not paste this file over Baota's whole site config blindly.
#
# Put limit_req_zone and limit_conn_zone inside the global Nginx http {} block.
limit_req_zone $binary_remote_addr zone=buyweb_api:10m rate=3r/s;
limit_req_zone $binary_remote_addr zone=buyweb_auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=buyweb_pay:10m rate=1r/s;
limit_conn_zone $binary_remote_addr zone=buyweb_conn:10m;

# Before SSL is issued, this HTTP server can proxy the site and allow
# Let's Encrypt HTTP-01 validation. After SSL is issued, Baota can enable
# "force HTTPS"; keep the challenge location reachable for renewal.
server {
    listen 80;
    server_name example.com www.example.com;

    client_max_body_size 6m;
    client_body_timeout 10s;
    keepalive_timeout 20s;
    send_timeout 20s;
    limit_conn buyweb_conn 30;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location ^~ /.well-known/acme-challenge/ {
        root /www/wwwroot/buy_web_linux;
        try_files $uri =404;
    }

    location ^~ /api/auth/ {
        limit_req zone=buyweb_auth burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/(orders|payments|refunds) {
        limit_req zone=buyweb_pay burst=10 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        limit_req zone=buyweb_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

